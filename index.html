<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Un Recuerdo Especial</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: black;
  color: white;
  overflow: hidden;
}

/* Fondo */
.fondo {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #111, #000);
  z-index: -2;
}

/* Contenedor */
.container {
  text-align: center;
  padding-top: 50px;
  z-index: 2;
  position: relative;
}

h1 { font-size: 40px; }
p { font-size: 18px; opacity: 0.8; }

/* Botón */
.boton {
  margin-top: 20px;
  padding: 12px 20px;
  background: white;
  color: black;
  border-radius: 20px;
  cursor: pointer;
  display: inline-block;
  transition: 0.3s;
}

.boton:hover {
  background: #ccc;
}

/* Fotos flotantes */
  
.flotante {
  position: absolute;
  width: 300px;
  border-radius: 20px;
  opacity: 0.95;
  animation: flotar 12s infinite ease-in-out;
  box-shadow: 0 20px 50px rgba(0,0,0,0.7);
}

.f1 { top: 15%; left: 5%; }
.f2 { top: 65%; left: 35%; }
.f3 { top: 20%; left: 65%; }
.f4 { top: 70%; left: 80%; }
.f5 { top: 50%; left: 45%; }

/* Corazones */
.corazon {
  position: absolute;
  color: rgba(255, 100, 150, 0.25);
  font-size: 20px;
  animation: subir 10s linear infinite;
}

/* Diferentes posiciones y tamaños */
.c1 { left: 15%; animation-delay: 0s; font-size: 18px; }
.c2 { left: 40%; animation-delay: 3s; font-size: 22px; }
.c3 { left: 65%; animation-delay: 6s; font-size: 30px; }
.c4 { left: 80%; animation-delay: 1s; font-size: 20px; }
.c5 { left: 18%; animation-delay: 2s; font-size: 18px; }
.c6 { left: 45%; animation-delay: 2s; font-size: 22px; }
.c7 { left: 75%; animation-delay: 3s; font-size: 16px; }
.c8 { left: 90%; animation-delay: 4s; font-size: 20px; }
.c9 { left: 80%; animation-delay: 1s; font-size: 20px; }
.c10 { left: 20%; animation-delay: 1s; font-size: 18px; }
.c11 { left: 22%; animation-delay: 2s; font-size: 30px; }
.c12 { left: 36%; animation-delay: 0s; font-size: 16px; }
.c13 { left: 95%; animation-delay: 4s; font-size: 20px; }

/* Animaciones */
@keyframes flotar {
  0%   { transform: translateY(0px) scale(1); }
  50%  { transform: translateY(-30px) scale(1.05); }
  100% { transform: translateY(0px) scale(1); }
}

@keyframes subir {
  0% {
    bottom: -10%;
    opacity: 0;
  }
  50% {
    opacity: 0.4;
  }
  100% {
    bottom: 110%;
    opacity: 0;
  }
}
</style>

</head>

<body>

<div class="fondo"></div>

<div class="container">
  <h1>UN MOMENTO ÚNICO</h1>
  <p>Con mucho cariño…</p>

  <div class="boton" onclick="activarMusica()">
    ▶️ Activar música
  </div>
</div>

<!-- Fotos flotantes -->
<img src="jani2.jpg" class="flotante f1">
<img src="jani1.jpg" class="flotante f2">
<img src="jani3.jpg" class="flotante f3">
<img src="jani5.jpg" class="flotante f4">
<img src="jani4.jpg" class="flotante f5">

<!-- Corazones flotando -->
<div class="corazon c1">❤</div>
<div class="corazon c2">❤</div>
<div class="corazon c3">❤</div>
<div class="corazon c4">❤</div>
<div class="corazon c5">❤</div>
<div class="corazon c6">❤</div>
<div class="corazon c7">❤</div>
<div class="corazon c8">❤</div>
<div class="corazon c9">❤</div>
<div class="corazon c10">❤</div>
<div class="corazon c11">❤</div>
<div class="corazon c12">❤</div>
<div class="corazon c13">❤</div>
<!-- Música -->
<audio id="musica" loop>
  <source src="diewithasmile.mp3" type="audio/mpeg">
</audio>

<script>
function activarMusica() {
  document.getElementById("musica").play();
}
</script>

</body>
</html>
